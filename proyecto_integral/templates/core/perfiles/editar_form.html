{% extends 'core/base.html' %}
{% load static %}

{% block title %}Editar perfil - Medici{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 50px auto; padding: 20px;">
    <h1 style="text-align: center; margin-bottom: 30px;">Editar perfil</h1>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label for="foto" style="display: block; font-weight: bold; margin-bottom: 5px;">Foto de perfil</label>
            {% if user.perfil.foto %}
                <div style="margin-bottom: 10px;">
                    <img src="{{ user.perfil.foto.url }}" alt="Foto actual" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
                </div>
            {% endif %}
            <input type="file" id="foto" name="foto" accept="image/*" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="first_name" style="display: block; font-weight: bold; margin-bottom: 5px;">Nombre</label>
            <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="last_name" style="display: block; font-weight: bold; margin-bottom: 5px;">Apellidos</label>
            <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="username" style="display: block; font-weight: bold; margin-bottom: 5px;">Usuario</label>
            <input type="text" id="username" name="username" value="{{ user.username }}" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" required>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="email" style="display: block; font-weight: bold; margin-bottom: 5px;">Correo electrónico</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" required>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="descripcion" style="display: block; font-weight: bold; margin-bottom: 5px;">Descripción</label>
            <textarea id="descripcion" name="descripcion" rows="4" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">{{ user.perfil.descripcion }}</textarea>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Redes sociales (opcional)</label>
            <input type="text" name="instagram" placeholder="Instagram" value="{{ user.perfil.redes_sociales.instagram|default:'' }}" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;">
            <input type="text" name="twitter" placeholder="Twitter" value="{{ user.perfil.redes_sociales.twitter|default:'' }}" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;">
            <input type="text" name="behance" placeholder="Behance" value="{{ user.perfil.redes_sociales.behance|default:'' }}" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 12px; background-color: #333; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">Guardar cambios</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="javascript:history.back()" style="color: #333;">← Volver</a>
    </div>
</div>
{% endblock %}
