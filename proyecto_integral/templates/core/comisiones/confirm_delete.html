{% extends 'core/base.html' %}

{% block content %}
<div class="container" style="max-width: 500px;">
    <h1>Eliminar comisión</h1>
    <p>¿Estás seguro de que quieres eliminar "{{ object.nombre }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'comision_detail' object.pk %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
