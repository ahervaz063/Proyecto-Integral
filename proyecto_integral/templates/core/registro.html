{% extends 'core/base.html' %}

{% block title %}Registrarse - Medici{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 50px auto; padding: 20px;">
    
    <h1 style="text-align: center; margin-bottom: 30px;">Registrarse</h1>
    
    <!-- Opciones: Artista o Cliente -->
    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
        <div id="opcion-artista" class="opcion-tipo" data-tipo="artista" style="flex: 1; text-align: center; padding: 20px; border: 2px solid #ccc; border-radius: 10px; cursor: pointer; background-color: #f5f5f5;">
            <h3>Artista</h3>
            <p>Quiero ofrecer mis servicios</p>
        </div>
        <div id="opcion-cliente" class="opcion-tipo" data-tipo="cliente" style="flex: 1; text-align: center; padding: 20px; border: 2px solid #ccc; border-radius: 10px; cursor: pointer; background-color: white;">
            <h3>Cliente</h3>
            <p>Quiero contratar artistas</p>
        </div>
    </div>
    
    <!-- Formulario de registro -->
    <form method="POST" action="#">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" style="width: 100%; padding: 12px; background-color: #333; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">Registrarse</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{% url 'login' %}" style="color: #333;">¿Ya tienes cuenta? Inicia sesión aquí.</a>
    </div>
</div>

<!-- JavaScript para cambiar entre Artista/Cliente -->
<script>
    const opcionArtista = document.getElementById('opcion-artista');
    const opcionCliente = document.getElementById('opcion-cliente');

    function getTipoUsuarioInput() {
        return document.querySelector('input[name="tipo_usuario"]');
    }

    opcionArtista.addEventListener('click', function() {
        opcionArtista.style.backgroundColor = '#f5f5f5';
        opcionArtista.style.borderColor = '#333';
        opcionCliente.style.backgroundColor = 'white';
        opcionCliente.style.borderColor = '#ccc';

        const input = getTipoUsuarioInput();
        if (input) input.value = 'artista';
    });
    
    opcionCliente.addEventListener('click', function() {
        opcionCliente.style.backgroundColor = '#f5f5f5';
        opcionCliente.style.borderColor = '#333';
        opcionArtista.style.backgroundColor = 'white';
        opcionArtista.style.borderColor = '#ccc';

        const input = getTipoUsuarioInput();
        if (input) input.value = 'cliente';
    });
</script>

<style>
    /* Mejora la apariencia de los campos del formulario */
    form p {
        margin-bottom: 15px;
    }
    form label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    form input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
    }
    .helptext {
        font-size: 0.8rem;
        color: #666;
        display: block;
        margin-top: 3px;
    }
    .errorlist {
        color: red;
        list-style: none;
        padding-left: 0;
        margin-bottom: 5px;
    }
</style>
{% endblock %}
